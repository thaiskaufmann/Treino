const IMAGENS = {...(window.IMGS_A||{}), ...(window.IMGS_B||{}), ...(window.IMGS_C||{}), ...(window.IMGS_D||{}), ...(window.IMGS_E||{})};
const AGENDA={0:null,1:'A',2:'B',3:'C',4:'B',5:'D',6:null};
const DIAS_S=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const DIAS_L=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
const MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const PERCEPCAO=[{v:'facil',label:'Fácil',e:'😌',c:'#4ade80'},{v:'ideal',label:'Ideal',e:'💪',c:'#fb6f92'},{v:'dificil',label:'Difícil',e:'🥵',c:'#f43f5e'}];

// ─── STORAGE (localStorage) ──────────────────────────────────────────────────
const KEY='treino:registros', KEY_C='treino:concluidos';
function salvarLS(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch(e){} }
function lerLS(k,def){ try{const v=localStorage.getItem(k);return v?JSON.parse(v):def;}catch(e){return def;} }
let REGISTROS=lerLS(KEY,[]);
let CONCLUIDOS=lerLS(KEY_C,{});

// ─── ESTADO GLOBAL ──────────────────────────────────────────────────────────
let TELA='hoje';
let TREINO_ATIVO=null, DATA_ATIVA=null;
let TREINO_KEY_ATUAL=null;  // pode ser trocado
let CAL_ANO=new Date().getFullYear(), CAL_MES=new Date().getMonth();
let EX_SELECIONADO=null;

// ─── UTILS ──────────────────────────────────────────────────────────────────
function dataLocalISO(d=new Date()){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtData(iso){
  const[a,m,d]=iso.split('-');
  return `${d} de ${MESES[parseInt(m)-1].toLowerCase().slice(0,3)}. ${a}`;
}
function fmtDataCurta(iso){const[,m,d]=iso.split('-');return`${d}/${m}`;}
function chaveSessao(data,treino){return`${data}|${treino}`;}
function statusDoDia(iso){
  const r=REGISTROS.find(x=>x.data===iso);
  if(r) return{treino:r.treino,comCarga:true,soMarcado:false};
  const k=Object.keys(CONCLUIDOS).find(c=>c.startsWith(iso+'|'));
  if(k) return{treino:CONCLUIDOS[k].treino,comCarga:false,soMarcado:true};
  return null;
}
function ultimoDe(exId,serie,antesDeData){
  return REGISTROS.filter(r=>r.exId===exId&&r.serie===serie&&r.data<antesDeData)
    .sort((a,b)=>a.data.localeCompare(b.data)).at(-1)||null;
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ─── NAVEGAÇÃO ───────────────────────────────────────────────────────────────
function irPara(tela, treinoKey, dataISO){
  TELA=tela;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('ativo'));
  const t=document.getElementById('tab-'+tela);
  if(t) t.classList.add('ativo');
  if(tela==='treino'){
    TREINO_ATIVO=treinoKey;
    DATA_ATIVA=dataISO||dataLocalISO();
    TREINO_KEY_ATUAL=treinoKey;
    renderTreino();
  } else if(tela==='hoje') renderHoje();
  else if(tela==='calendario') renderCalendario();
  else if(tela==='progresso') renderProgresso();
}

function setContent(html){
  const c=document.getElementById('content');
  c.innerHTML=html;
  c.scrollTop=0;
}

// ─── TELA: HOJE ─────────────────────────────────────────────────────────────
function renderHoje(){
  const hoje=new Date(), hojeISO=dataLocalISO(hoje), dow=hoje.getDay();
  const tkPlan=AGENDA[dow], treinoHoje=tkPlan?TREINOS[tkPlan]:null;
  const st=statusDoDia(hojeISO);
  const tkFeito=st?st.treino:null;
  const jaTreinou=!!tkFeito, trocado=jaTreinou&&tkPlan&&tkFeito!==tkPlan;
  const semCarga=st&&st.soMarcado;
  const keyAbrir=tkFeito||tkPlan;
  const totalSessoes=new Set(REGISTROS.map(r=>r.data+r.treino).concat(Object.keys(CONCLUIDOS))).size;

  // semana (seg→dom)
  const base=new Date(hoje), semana=[];
  const seg=new Date(base); seg.setDate(base.getDate()-(( dow+6)%7));
  for(let i=0;i<7;i++){const d=new Date(seg);d.setDate(seg.getDate()+i);semana.push(d);}

  let semanaHTML=semana.map(d=>{
    const diso=dataLocalISO(d), ddow=d.getDay(), tkP=AGENDA[ddow];
    const s=statusDoDia(diso), tf=s?s.treino:null;
    const treinou=!!tf, tkM=tf||tkP, ehHoje=diso===hojeISO;
    const trc=treinou&&tkP&&tf!==tkP, abre=tf||tkP;
    const bg=tkM?(treinou?'#4ade80':'#fb6f92'):'transparent';
    const col=tkM?'#fff':'#ccc';
    const onclick=abre?`irPara('treino','${abre}','${diso}')`:'';
    return `<button class="dia-semana${ehHoje?' hoje':''}" style="opacity:${tkM?1:.5};cursor:${abre?'pointer':'default'}" ${onclick?`onclick="${onclick}"`:''}>`+
      `<span class="dia-nome">${DIAS_S[ddow]}</span>`+
      `<span class="dia-num">${d.getDate()}</span>`+
      `<span class="dia-treino-badge" style="background:${bg};color:${col}">${tkM||'—'}</span>`+
      (trc?'<span class="dot-trocado"></span>':'')+
      `</button>`;
  }).join('');

  let fichasHTML=Object.entries(TREINOS).map(([k,t])=>
    `<button class="card-treino" onclick="irPara('treino','${k}','${dataLocalISO()}')">`+
    `<span class="letra-treino">${k}</span>`+
    `<span class="nome-treino">${esc(t.foco)}</span>`+
    `<span class="qtd-ex">${t.exercicios.length} exercícios</span>`+
    `</button>`
  ).join('');

  let cardHojeHTML='';
  if(treinoHoje){
    cardHojeHTML=`<div class="card-hoje">`+
      `<div class="card-hoje-top"><div>`+
      `<div class="card-hoje-label">TREINO DE HOJE</div>`+
      `<div class="card-hoje-titulo">Treino ${tkPlan}</div>`+
      `<div class="card-hoje-foco">${esc(treinoHoje.foco)}</div>`+
      `</div><span class="card-hoje-letra">${tkPlan}</span></div>`+
      (jaTreinou?`<div class="ja-feito">✓ Hoje você ${semCarga?'marcou como feito':'registrou'} o Treino ${tkFeito}${trocado?` (trocou do ${tkPlan})`:''}</div>`:'');
    if(keyAbrir) cardHojeHTML+=`<button class="btn-comecar" onclick="irPara('treino','${keyAbrir}','${hojeISO}')">${jaTreinou?'Continuar registrando →':'Começar treino →'}</button>`;
    cardHojeHTML+=`</div>`;
  } else {
    cardHojeHTML=`<div class="card-descanso"><div style="font-size:36px">🌙</div><h2 style="color:var(--pink);margin:8px 0 4px">Dia de descanso</h2><p class="legenda">Aproveite pra recuperar! Se quiser treinar, escolha uma ficha abaixo.</p></div>`;
  }

  
  var backupHTML = `<div class="backup-wrap">
    <p class="backup-titulo">💾 Backup dos seus dados</p>
    <p class="backup-desc">Exporte para salvar seu histórico de cargas. Importe para restaurar em caso de perda.</p>
    <div class="backup-btns">
      <button class="btn-exportar" onclick="exportarDados()">⬇ Exportar backup</button>
      <button class="btn-importar" onclick="abrirImportacao()">⬆ Importar backup</button>
    </div>
    <input type="file" id="import-input" class="import-input" accept=".json" onchange="importarDados(this)">
    <p class="backup-ok" id="backup-ok"></p>
    <p class="backup-erro" id="backup-erro"></p>
  </div>`;

  setContent(`<div class="tela ativa fade-in" style="padding-bottom:8px">`+
    `<h1 class="titulo">Olá, Thais! 👋</h1>`+
    `<p class="legenda">${DIAS_L[dow]}, ${hoje.getDate()} de ${MESES[hoje.getMonth()].toLowerCase()}</p>`+
    cardHojeHTML+
    `<h3 class="subtitulo">Sua semana</h3><div class="semana-grid">${semanaHTML}</div>`+
    `<h3 class="subtitulo">Todas as fichas</h3><div class="grid-treinos">${fichasHTML}</div>`+
    `<div class="stats-bar">`+
    `<div class="stat-box"><div class="stat-num">${totalSessoes}</div><div class="stat-label">sessões registradas</div></div>`+
    `<div class="stat-box"><div class="stat-num">${REGISTROS.length}</div><div class="stat-label">séries anotadas</div></div>`+
    `</div>` + backupHTML + `</div>`);
}

// ─── TELA: CALENDÁRIO ───────────────────────────────────────────────────────
function renderCalendario(){
  const hojeISO=dataLocalISO();
  const primeiro=new Date(CAL_ANO,CAL_MES,1);
  const offset=(primeiro.getDay()+6)%7;
  const ultimoDia=new Date(CAL_ANO,CAL_MES+1,0).getDate();
  let celulas=Array(offset).fill(null);
  for(let d=1;d<=ultimoDia;d++) celulas.push(new Date(CAL_ANO,CAL_MES,d));

  const gridHTML=celulas.map(d=>{
    if(!d) return '<span></span>';
    const iso=dataLocalISO(d), dow=d.getDay(), tkP=AGENDA[dow];
    const s=statusDoDia(iso), tf=s?s.treino:null;
    const treinou=!!tf, tkM=tf||tkP, ehHoje=iso===hojeISO;
    const trc=treinou&&tkP&&tf!==tkP, semCarga=s&&s.soMarcado;
    const abre=tf||tkP;
    let badgeHTML='';
    if(tkM){
      const bg=treinou?(semCarga?'#86c99a':'#4ade80'):'#ffd6e0';
      const col=treinou?'#fff':'#b06';
      badgeHTML=`<span class="cal-badge" style="background:${bg};color:${col}">${tkM}${treinou?'✓':''}${trc?'*':''}</span>`;
    }
    return `<button class="cal-dia${ehHoje?' hoje':''}" style="cursor:${abre?'pointer':'default'}" ${abre?`onclick="irPara('treino','${abre}','${iso}')"`:''}>`+
      `<span class="cal-dia-num" style="font-weight:${ehHoje?800:500}">${d.getDate()}</span>${badgeHTML}</button>`;
  }).join('');

  const agendaHTML=[1,2,3,4,5].map(dow=>
    `<div class="agenda-linha"><span class="agenda-dia">${DIAS_L[dow]}</span><span class="agenda-treino">Treino ${AGENDA[dow]} · ${esc(TREINOS[AGENDA[dow]].foco)}</span></div>`
  ).join('')+`<div class="agenda-linha" style="opacity:.6"><span class="agenda-dia">Sáb / Dom</span><span class="agenda-treino">Descanso (ou Treino E extra)</span></div>`;

  setContent(`<div class="tela ativa fade-in">`+
    `<h1 class="titulo">Calendário</h1>`+
    `<p class="legenda">Toque num dia para abrir o treino.</p>`+
    `<div class="cal-nav">`+
    `<button class="cal-nav-btn" onclick="mudarMes(-1)">←</button>`+
    `<span class="cal-mes-txt">${MESES[CAL_MES]} ${CAL_ANO}</span>`+
    `<button class="cal-nav-btn" onclick="mudarMes(1)">→</button></div>`+
    `<div class="cal-head">${['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'].map(d=>`<span>${d}</span>`).join('')}</div>`+
    `<div class="cal-grid">${gridHTML}</div>`+
    `<div class="legenda-cal">`+
    `<span class="leg-item"><span class="leg-bolinha" style="background:#fb6f92"></span>Inferior</span>`+
    `<span class="leg-item"><span class="leg-bolinha" style="background:#fb6f92"></span>Superior</span>`+
    `<span class="leg-item"><span class="leg-bolinha" style="background:#4ade80"></span>Feito ✓</span>`+
    `<span class="leg-item"><span class="leg-bolinha" style="background:#86c99a"></span>Sem cargas ✓</span>`+
    `<span class="leg-item"><span class="leg-bolinha" style="background:#a06a1f"></span>* trocado</span></div>`+
    `<div class="card-agenda"><h3 class="subtitulo" style="margin-top:0">Agenda fixa</h3>${agendaHTML}</div>`+
    `</div>`);
}
function mudarMes(d){CAL_MES+=d;if(CAL_MES>11){CAL_MES=0;CAL_ANO++;}else if(CAL_MES<0){CAL_MES=11;CAL_ANO--;}renderCalendario();}

// ─── TELA: TREINO ───────────────────────────────────────────────────────────
let FORM_STATE={};  // chave: exId-serie → {carga,reps,percepcao,salvo}
let OBS_ABERTOS={};
let MOSTRAR_TROCA=false;

function renderTreino(){
  FORM_STATE={};OBS_ABERTOS={};MOSTRAR_TROCA=false;
  _preencherForm();
  _injetarTreino();
}

function _preencherForm(){
  REGISTROS.filter(r=>r.data===DATA_ATIVA&&r.treino===TREINO_KEY_ATUAL).forEach(r=>{
    FORM_STATE[`${r.exId}-${r.serie}`]={carga:r.carga,reps:r.reps,percepcao:r.percepcao};
  });
}

function _injetarTreino(){
  const treino=TREINOS[TREINO_KEY_ATUAL];
  const dataObj=new Date(DATA_ATIVA+'T12:00:00');
  const dow=dataObj.getDay(), tkPlan=AGENDA[dow];
  const foiTrocado=tkPlan&&TREINO_KEY_ATUAL!==tkPlan;
  const sessConcluida=!!CONCLUIDOS[chaveSessao(DATA_ATIVA,TREINO_KEY_ATUAL)];

  // troca
  let trocaHTML=`<div class="troca-wrap">`+
    `<button class="btn-trocar" onclick="toggleTroca()">${MOSTRAR_TROCA?'✕ Cancelar':'🔄 Trocar treino'}</button>`+
    (foiTrocado?`<span class="tag-trocado">Trocado — agenda previa Treino ${tkPlan}</span>`:'')+
    `</div>`;
  if(MOSTRAR_TROCA){
    const opcs=Object.entries(TREINOS).map(([k,t])=>
      `<button class="troca-opcao${k===TREINO_KEY_ATUAL?' ativa':''}" onclick="trocarTreino('${k}')">`+
      `<span class="troca-letra">${k}</span>`+
      `<span class="troca-foco">${esc(t.foco)}</span>`+
      (k===tkPlan?'<span class="badge-prev">previsto hoje</span>':'')+
      `</button>`).join('');
    trocaHTML+=`<div class="troca-painel"><p class="troca-titulo">Qual treino você fez de verdade?</p><div class="troca-grid">${opcs}</div></div>`;
  }

  // ativação
  const at=treino.ativacao;
  let atHTML=`<div class="card-ativacao">`+
    `<div class="badge-ativacao">🔥 ATIVAÇÃO + AQUECIMENTO</div>`+
    `<div class="bloco-ativ"><p class="ativ-titulo">Ativação muscular</p><p class="ativ-desc">${esc(at.descricaoAtivacao)}</p><p class="ativ-series">${esc(at.seriesAtivacao)}</p></div>`+
    `<div class="bloco-ativ"><p class="ativ-titulo">Aquecimento</p><p class="ativ-desc">${esc(at.descricaoAquecimento)}</p><p class="ativ-series">${esc(at.seriesAquecimento)}</p></div>`+
    `<div class="ativ-obs">📝 ${esc(at.obs)}</div>`+
    `<div class="ativ-descanso">⏱️ ${esc(at.descanso)}</div>`+
    `<div class="ativ-campos">`;
  for(let s=1;s<=at.camposAtivacao;s++){
    const exId=`${TREINO_KEY_ATUAL}-ativacao`;
    atHTML+=_miniCampo(`Ativação ${s}ª`,exId,s);
  }
  for(let s=1;s<=at.camposAquecimento;s++){
    const exId=`${TREINO_KEY_ATUAL}-aquecimento`;
    atHTML+=_miniCampo(`Aquecimento ${s}ª`,exId,s);
  }
  atHTML+=`</div></div>`;

  // exercícios
  const exsHTML=treino.exercicios.map((ex,idx)=>{
    const imgKey=`${TREINO_KEY_ATUAL}_${ex.id}`;
    const imgSrc=IMAGENS[imgKey]||'';
    let h=`<div class="card-ex">`+
      `<div class="ex-head"><h3 class="ex-nome"><span class="ex-num">${idx+1}</span> ${esc(ex.nome)}</h3>`+
      (ex.nota?`<p class="ex-nota">⚠️ ${esc(ex.nota)}</p>`:'')+
      `<p class="ex-descanso">⏱️ Descanso: ${esc(ex.descanso)}</p></div>`;
    if(imgSrc) h+=`<img src="${imgSrc}" alt="${esc(ex.nome)}" class="ex-img" loading="lazy" onclick="abrirLightbox(this.src,\`${esc(ex.nome).replace(/`/g,'\\`')}\`)">`;
    ex.series.forEach((si,i)=>{
      const serie=i+1, chave=`${ex.id}-${serie}`;
      const ref=ultimoDe(ex.id,serie,DATA_ATIVA);
      const atual=FORM_STATE[chave]||{};
      const obsAberta=!!OBS_ABERTOS[chave];
      const percAtual=atual.percepcao||'';
      h+=`<div class="serie-bloco">`+
        `<div class="serie-topo">`+
        `<span class="serie-label">${serie}ª série</span>`+
        `<span class="serie-rep">${esc(si.rep)}</span>`+
        `<button class="btn-obs" onclick="toggleObs('${chave}')">${obsAberta?'ocultar':'como fazer ▾'}</button>`+
        `</div>`;
      if(obsAberta) h+=`<div class="serie-obs">${esc(si.obs)}</div>`;
      if(ref) h+=`<div class="ref-tag">🔁 Última vez: <b>${esc(ref.carga)||'—'} kg</b> × ${esc(ref.reps)||'—'} reps <span class="ref-data">(${fmtDataCurta(ref.data)})</span></div>`;
      h+=`<div class="linha-inputs">`+
        _inputWrap('decimal',atual.carga||'',ref?ref.carga:'kg',`setCampo('${ex.id}',${serie},'carga',this.value)`,'carga')+
        _inputWrap('numeric',atual.reps||'',ref?ref.reps:'reps',`setCampo('${ex.id}',${serie},'reps',this.value)`,'reps')+
        `<div class="percepcao-wrap">`;
      PERCEPCAO.forEach(p=>{
        const ativo=percAtual===p.v;
        h+=`<button class="emoji-btn${ativo?' ativo':''}" style="${ativo?`background:${p.c}`:'background:transparent'}" title="${p.label}" onclick="setCampo('${ex.id}',${serie},'percepcao','${p.v}')">${p.e}</button>`;
      });
      h+=`</div>`;
      const salvo=atual.salvo;
      h+=`<button class="btn-salvar${salvo?' salvo':''}" id="btn-${chave}" style="background:${salvo?'#4ade80':'#fb6f92'}" onclick="salvarSerie('${ex.id}','${ex.nome.replace(/'/g,"\\'")}',${serie})">${salvo?'✓':'salvar'}</button>`;
      h+=`</div></div>`;
    });
    if(ex.hibrido) h+=`<div class="hibrido-tag">🏃‍♀️ ${esc(ex.hibrido)}</div>`;
    h+=`</div>`;
    return h;
  }).join('');

  // finalizar
  let finHTML=`<div class="finalizar-wrap">`;
  if(sessConcluida){
    finHTML+=`<div class="feito-banner">✅ Treino marcado como feito</div>`+
      `<button class="btn-desfazer" onclick="marcarFeito(false)">Desmarcar como feito</button>`;
  } else {
    finHTML+=`<button class="btn-finalizar" onclick="marcarFeito(true)">✓ Finalizar treino</button>`;
  }
  finHTML+=`<p class="finalizar-dica">Você pode marcar o treino como feito mesmo sem anotar as cargas.</p></div>`;

  const notaTreino=treino.notaTreino?`<div class="aviso-hibrido">⚡ ${esc(treino.notaTreino)}</div>`:'';

  setContent(`<div class="tela ativa fade-in">`+
    `<button class="btn-voltar" onclick="irPara('hoje')">← Voltar</button>`+
    `<div class="treino-header"><span class="letra-grande">${TREINO_KEY_ATUAL}</span><div>`+
    `<h3 class="treino-titulo">${esc(treino.nome)}</h3><p class="legenda">${esc(treino.foco)}</p></div></div>`+
    `<p class="data-hoje">📅 ${DIAS_L[dow]} · ${fmtData(DATA_ATIVA)}</p>`+
    trocaHTML+notaTreino+atHTML+
    `<div class="divisoria"><span class="divisoria-txt">💪 TREINO</span></div>`+
    exsHTML+finHTML+`</div>`);
}

function _inputWrap(mode,val,ph,onchange,lbl){
  return `<div class="input-wrap"><input type="text" inputmode="${mode}" value="${esc(val)}" placeholder="${esc(ph)}" oninput="${onchange}"><label class="input-label">${lbl}</label></div>`;
}
function _miniCampo(label,exId,serie){
  const atual=FORM_STATE[`${exId}-${serie}`]||{};
  const ref=ultimoDe(exId,serie,DATA_ATIVA);
  const salvo=atual.salvo;
  return `<div class="mini-linha">`+
    `<span class="mini-label">${esc(label)}</span>`+
    _inputWrap('decimal',atual.carga||'',ref?ref.carga:'kg',`setCampo('${exId}',${serie},'carga',this.value)`,'carga')+
    _inputWrap('numeric',atual.reps||'',ref?ref.reps:'reps',`setCampo('${exId}',${serie},'reps',this.value)`,'reps')+
    `<button class="btn-salvar${salvo?' salvo':''}" style="background:${salvo?'#4ade80':'#fb6f92'}" onclick="salvarSerie('${exId}','${label}',${serie})">${salvo?'✓':'salvar'}</button>`+
    `</div>`;
}

// ─── AÇÕES DO TREINO ────────────────────────────────────────────────────────
function setCampo(exId,serie,campo,valor){
  const ch=`${exId}-${serie}`;
  if(!FORM_STATE[ch]) FORM_STATE[ch]={};
  FORM_STATE[ch][campo]=valor;
  // atualiza emojis de percepção sem re-render completo
  if(campo==='percepcao'){
    document.querySelectorAll('.emoji-btn').forEach(b=>{
      const v=b.getAttribute('onclick').match(/'([a-z]+)'\)$/)?.[1];
      const parentSerie=b.closest('.serie-bloco');
      if(!parentSerie) return;
      const isThisSerie=parentSerie.querySelector('.btn-salvar')?.id===`btn-${ch}`;
      if(isThisSerie){
        const p=PERCEPCAO.find(x=>x.v===v);
        if(v===valor){b.classList.add('ativo');b.style.background=p?p.c:'transparent';}
        else{b.classList.remove('ativo');b.style.background='transparent';}
      }
    });
  }
}

function salvarSerie(exId,exNome,serie){
  const ch=`${exId}-${serie}`, d=FORM_STATE[ch]||{};
  if(!d.carga&&!d.reps) return;
  const novo={id:Date.now()+'-'+Math.random().toString(36).slice(2,6),
    data:DATA_ATIVA,treino:TREINO_KEY_ATUAL,exId,exNome,serie,
    carga:d.carga||'',reps:d.reps||'',percepcao:d.percepcao||'ideal'};
  REGISTROS=REGISTROS.filter(r=>!(r.data===DATA_ATIVA&&r.exId===exId&&r.serie===serie));
  REGISTROS.push(novo);
  salvarLS(KEY,REGISTROS);
  FORM_STATE[ch]={...FORM_STATE[ch],salvo:true};
  const btn=document.getElementById(`btn-${ch}`);
  if(btn){btn.textContent='✓';btn.style.background='#4ade80';}
  setTimeout(()=>{
    if(FORM_STATE[ch]) FORM_STATE[ch].salvo=false;
    const b=document.getElementById(`btn-${ch}`);
    if(b){b.textContent='salvar';b.style.background='#fb6f92';}
  },1500);
}

function toggleObs(chave){
  OBS_ABERTOS[chave]=!OBS_ABERTOS[chave];
  _injetarTreino();
  // mantém scroll
}
function toggleTroca(){MOSTRAR_TROCA=!MOSTRAR_TROCA;_injetarTreino();}
function trocarTreino(k){TREINO_KEY_ATUAL=k;MOSTRAR_TROCA=false;FORM_STATE={};_preencherForm();_injetarTreino();}
function marcarFeito(feito){
  const k=chaveSessao(DATA_ATIVA,TREINO_KEY_ATUAL);
  if(feito) CONCLUIDOS[k]={data:DATA_ATIVA,treino:TREINO_KEY_ATUAL,feitoEm:new Date().toISOString()};
  else delete CONCLUIDOS[k];
  salvarLS(KEY_C,CONCLUIDOS);
  _injetarTreino();
}

// ─── TELA: PROGRESSO ────────────────────────────────────────────────────────
function renderProgresso(){
  if(!REGISTROS.length){
    setContent(`<div class="tela ativa fade-in"><h1 class="titulo">Progresso</h1>`+
      `<div class="vazio"><div style="font-size:48px">🏋️‍♀️</div><h2 style="color:var(--pink)">Ainda sem registros</h2>`+
      `<p class="legenda">Anote suas cargas nos treinos e seu progresso aparece aqui.</p></div></div>`);
    return;
  }
  // lista de exercícios únicos
  const exIds=[...new Set(REGISTROS.map(r=>r.exId))];
  if(!EX_SELECIONADO||!exIds.includes(EX_SELECIONADO)) EX_SELECIONADO=exIds[0];

  const opcs=exIds.map(id=>{
    const r=REGISTROS.find(x=>x.exId===id);
    return `<option value="${esc(id)}" ${id===EX_SELECIONADO?'selected':''}>[${r.treino}] ${esc(r.exNome)}</option>`;
  }).join('');

  // dados do gráfico
  const porData={};
  REGISTROS.filter(r=>r.exId===EX_SELECIONADO).forEach(r=>{
    const c=parseFloat(String(r.carga).replace(',','.'));
    if(!isNaN(c)) porData[r.data]=Math.max(porData[r.data]||0,c);
  });
  const grafDados=Object.entries(porData).sort((a,b)=>a[0].localeCompare(b[0]));

  // gráfico SVG simples
  let grafHTML='<p class="legenda">Sem dados numéricos de carga ainda.</p>';
  if(grafDados.length>=1){
    const vals=grafDados.map(([,v])=>v);
    const minV=Math.min(...vals), maxV=Math.max(...vals);
    const W=320,H=140,PAD=36,PADT=10;
    const xs=grafDados.map((_,i)=>PAD+i*(W-PAD-16)/(Math.max(grafDados.length-1,1)));
    const ys=grafDados.map(([,v])=>PADT+(H-PADT-24)*(1-(maxV===minV?0.5:(v-minV)/(maxV-minV))));
    let path='M'+xs.map((x,i)=>`${x},${ys[i]}`).join('L');
    let pts=xs.map((x,i)=>`<circle cx="${x}" cy="${ys[i]}" r="5" fill="#fb6f92"/>`+
      `<title>${grafDados[i][0]}: ${grafDados[i][1]}kg</title>`).join('');
    let lbls=grafDados.map(([d],i)=>`<text x="${xs[i]}" y="${H-4}" text-anchor="middle" font-size="9" fill="#a4757f">${fmtDataCurta(d)}</text>`).join('');
    let ylbls=[minV,maxV].map((v,i)=>`<text x="4" y="${i===0?ys[vals.indexOf(maxV)]+4:ys[vals.indexOf(minV)]+4}" font-size="9" fill="#a4757f">${v}kg</text>`).join('');
    grafHTML=`<div class="grafico-wrap"><svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">`+
      `<polyline points="${xs.map((x,i)=>`${x},${ys[i]}`).join(' ')}" fill="none" stroke="#ffd6e0" stroke-width="2.5"/>`+
      `<polyline points="${xs.map((x,i)=>`${x},${ys[i]}`).join(' ')}" fill="none" stroke="#fb6f92" stroke-width="2.5"/>`+
      pts+lbls+ylbls+`</svg></div>`;
  }

  // histórico
  const porSessao={};
  REGISTROS.forEach(r=>{
    const k=r.data+'|'+r.treino;
    if(!porSessao[k]) porSessao[k]={data:r.data,treino:r.treino,itens:[]};
    porSessao[k].itens.push(r);
  });
  const hist=Object.values(porSessao).sort((a,b)=>b.data.localeCompare(a.data));
  const histHTML=hist.map(sess=>{
    const exMap={};
    sess.itens.forEach(it=>{if(!exMap[it.exId]) exMap[it.exId]={nome:it.exNome,itens:[]};exMap[it.exId].itens.push(it);});
    const exHTML=Object.values(exMap).map(ex=>{
      const seriesHTML=ex.itens.sort((a,b)=>a.serie-b.serie).map(it=>{
        const p=PERCEPCAO.find(x=>x.v===it.percepcao)||PERCEPCAO[1];
        return `<span class="hist-serie"><b>${it.serie}ª</b> ${esc(it.carga)||'—'}kg×${esc(it.reps)||'—'} ${p.e}</span>`;
      }).join('');
      return `<div class="hist-ex-nome">${esc(ex.nome)}</div><div class="hist-series">${seriesHTML}</div>`;
    }).join('');
    return `<div class="card-hist">`+
      `<div class="hist-head"><span class="hist-treino">Treino ${sess.treino}</span><span class="hist-data">${fmtData(sess.data)}</span></div>`+
      exHTML+`</div>`;
  }).join('');

  setContent(`<div class="tela ativa fade-in">`+
    `<h1 class="titulo">Meu progresso</h1>`+
    `<p class="legenda">Evolução de carga por exercício</p>`+
    `<select class="select-ex" onchange="trocarExGrafico(this.value)">${opcs}</select>`+
    grafHTML+
    `<h3 class="subtitulo">Histórico</h3>${histHTML}</div>`);
}
function trocarExGrafico(id){EX_SELECIONADO=id;renderProgresso();}

// ─── INIT ────────────────────────────────────────────────────────────────────
renderHoje();


// ─── BACKUP ──────────────────────────────────────────────────────────────────
function exportarDados(){
  const payload = {
    versao: 1,
    exportadoEm: new Date().toISOString(),
    registros: REGISTROS,
    concluidos: CONCLUIDOS
  };
  const json = JSON.stringify(payload, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const data = new Date().toISOString().slice(0,10);
  const a = document.createElement('a');
  a.href = url;
  a.download = `natflix-backup-${data}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  _feedbackBackup('ok','✓ Backup exportado com sucesso!');
}

function abrirImportacao(){
  document.getElementById('import-input').click();
}

function importarDados(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const payload = JSON.parse(e.target.result);
      if(!payload.versao || !Array.isArray(payload.registros)){
        _feedbackBackup('erro','✗ Arquivo inválido. Use um backup gerado por este app.');
        return;
      }
      // mescla: mantém registros locais + adiciona os do backup que não existem
      const idsLocais = new Set(REGISTROS.map(r=>r.id));
      const novos = payload.registros.filter(r=>!idsLocais.has(r.id));
      REGISTROS = [...REGISTROS, ...novos];
      // mescla concluidos
      CONCLUIDOS = {...(payload.concluidos||{}), ...CONCLUIDOS};
      salvarLS(KEY, REGISTROS);
      salvarLS(KEY_C, CONCLUIDOS);
      _feedbackBackup('ok', `✓ ${novos.length} sessões importadas com sucesso!`);
      // atualiza a tela atual
      setTimeout(()=>renderHoje(), 800);
    } catch(err){
      _feedbackBackup('erro','✗ Erro ao ler o arquivo. Tente novamente.');
    }
    input.value = '';
  };
  reader.readAsText(file);
}

function _feedbackBackup(tipo, msg){
  const ok  = document.getElementById('backup-ok');
  const err = document.getElementById('backup-erro');
  if(!ok||!err) return;
  ok.style.display  = tipo==='ok'  ? 'block' : 'none';
  err.style.display = tipo==='erro' ? 'block' : 'none';
  if(tipo==='ok')  ok.textContent  = msg;
  if(tipo==='erro') err.textContent = msg;
  setTimeout(()=>{ok.style.display='none';err.style.display='none';}, 3500);
}


// ─── LIGHTBOX ────────────────────────────────────────────────────────────────
function abrirLightbox(src, label){
  const overlay = document.getElementById('lightbox');
  const img     = document.getElementById('lightbox-img');
  const lbl     = document.getElementById('lightbox-label');
  img.src   = src;
  lbl.textContent = label || '';
  overlay.classList.add('aberto');
  document.body.style.overflow = 'hidden';
}
function fecharLightbox(e){
  if(e && e.target !== document.getElementById('lightbox') &&
         e.target !== document.querySelector('.lightbox-fechar')) return;
  if(e && e.target === document.getElementById('lightbox-img')) return;
  document.getElementById('lightbox').classList.remove('aberto');
  document.getElementById('lightbox-img').src = '';
  document.body.style.overflow = '';
}
// fecha com swipe pra baixo no iOS
(function(){
  let startY=0;
  document.addEventListener('touchstart', e=>{
    if(document.getElementById('lightbox').classList.contains('aberto'))
      startY=e.touches[0].clientY;
  },{passive:true});
  document.addEventListener('touchend', e=>{
    if(!document.getElementById('lightbox').classList.contains('aberto')) return;
    const dy=e.changedTouches[0].clientY-startY;
    if(dy>80){ document.getElementById('lightbox').classList.remove('aberto');
               document.getElementById('lightbox-img').src='';
               document.body.style.overflow=''; }
  },{passive:true});
})();

</script>

<div class="lightbox-overlay" id="lightbox" onclick="fecharLightbox(event)">
  <button class="lightbox-fechar" onclick="fecharLightbox()">✕</button>
  <img class="lightbox-img" id="lightbox-img" src="" alt="">
  <p class="lightbox-label" id="lightbox-label"></p>
</div>
